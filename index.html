            { number: 14, type: 'mcq', question: { en: "Pseudomonascea is easy growth on:" }, options: { en: ["A. Specific media", "B. ordinary media", "C. selective media", "D. chromogen media"] }, answer: { en: "B. ordinary media" } },
            { number: 15, type: 'mcq', question: { en: "Which of the following Gram negative rods does not ferment glucose and is oxydase positive?" }, options: { en: ["A. E.coli", "B. P.vulgaris", "C. P.aeruginosa", "D. Salmonella"] }, answer: { en: "C. P.aeruginosa" } },
            { number: 16, type: 'mcq', question: { en: "Escherichia coli that cause Shigella-like diarrhea:" }, options: { en: ["A. Enterotoxigenic (ETEC)", "B. Enteroinvasive(EIEC)", "C. Enteropathogenic(EPEC)", "D. Enterohemorrhagic(EHEC)"] }, answer: { en: "B. Enteroinvasive(EIEC)" } },
            { number: 17, type: 'mcq', question: { en: "Escherichia coli that cause Infantile diarrhea Salmonella-like with fever:" }, options: { en: ["A. Enterotoxigenic (ETEC)", "B. Enteroinvasive(EIEC)", "C. Enteropathogenic(EPEC)", "D. Enterohemorrhagic(EHEC)"] }, answer: { en: "C. Enteropathogenic(EPEC)" } },
            { number: 18, type: 'mcq', question: { en: "Escherichia coli that cause Traveller's diarrhea:" }, options: { en: ["A. Enterotoxigenic (ETEC)", "B. Enteroinvasive(EIEC)", "C. Enteropathogenic(EPEC)", "D. Enterohemorrhagic(EHEC)"] }, answer: { en: "A. Enterotoxigenic (ETEC)" } },
            { number: 19, type: 'mcq', question: { en: "Escherichia coli that cause Hemorrhagic colitis:" }, options: { en: ["A. Enterotoxigenic (ETEC)", "B. Enteroinvasive(EIEC)", "C. Enteropathogenic(EPEC)", "D. Enterohemorrhagic(EHEC)"] }, answer: { en: "D. Enterohemorrhagic(EHEC)" } },
            { number: 20, type: 'mcq', question: { en: "Disease that affects many people at different countries is termed as:" }, options: { en: ["A. Sporadic", "B. Pandemic", "C. Epidemic", "D. endemic"] }, answer: { en: "B. Pandemic" } },
            { number: 21, type: 'mcq', question: { en: "If the vectors transmit the infection machanically they are called:" }, options: { en: ["A. biological vectors", "B. Mechanical vectors", "C. Biological Reservoir", "D. Both a and c"] }, answer: { en: "B. Mechanical vectors" } },
            { number: 22, type: 'mcq', question: { en: "If a person can be infected by direct contact with infected tissue of another person, it is termed as:" }, options: { en: ["A. Indirect contact transmission", "B. Attachment", "C. Direct contact transmission", "D. None of these"] }, answer: { en: "C. Direct contact transmission" } },
            { number: 23, type: 'mcq', question: { en: "The most important virulence factors are:" }, options: { en: ["A. Adhesions", "B. Invasiveness", "C. Toxigenicity and enzymes", "D. All of the above"] }, answer: { en: "D. All of the above" } },
            { number: 24, type: 'mcq', question: { en: "The ability of pathogen to spread in the host tissues after establishing the infection is known as:" }, options: { en: ["A. Adhesions", "B. Invasiveness", "C. Toxigenicity", "D. None of these"] }, answer: { en: "B. Invasiveness" } },
            { number: 25, type: 'mcq', question: { en: "Which is the following enzyme acts as a spreading factor?" }, options: { en: ["A. Hyaluronidase", "B. Coagulase", "C. Catalase", "D. Dnase"] }, answer: { en: "A. Hyaluronidase" } }
        ];

        let quizDataPart4 = [
            { number: 1, type: 'mcq', question: { en: "Septicaemia is:" }, options: { en: ["A. Bacteria in blood", "B. Toxin in blood", "C. Pus in blood", "D. Multiplication of bacteria and toxins in blood"] }, answer: { en: "D. Multiplication of bacteria and toxins in blood" } },
            { number: 2, type: 'mcq', question: { en: "Name the type of diarrhea caused by V.cholerae?" }, options: { en: ["A. Acute watery diarrhea with blood", "B. Acute watery diarrhea resembling rice water", "C. Mild watery diarrhea with no blood", "D. Acute watery diarrhea with no blood"] }, answer: { en: "B. Acute watery diarrhea resembling rice water" } },
            { number: 3, type: 'mcq', question: { en: "Campylobacter jejuni is a microaerophilic bacteria, which of the statement is true for the culture of this bacteria?" }, options: { en: ["A. An atmosphere of increase O2(10%) with added CO2(5%)", "B. An atmosphere of reduced O2(5%) with added CO2(10%)", "C. An atmosphere of reduces CO2(5%) with added CO2(10%)", "D. An atmosphere of increase CO2(10%) with added O2(5%)"] }, answer: { en: "B. An atmosphere of reduced O2(5%) with added CO2(10%)" } },
            { number: 4, type: 'mcq', question: { en: "Helicobacter pylori is associated with all of the following, Except?" }, options: { en: ["A. Malt lymphoma", "B. Gastric Carcinoma", "C. Peptic ulcer", "D. Burkitt lymphoma"] }, answer: { en: "D. Burkitt lymphoma" } },
            { number: 5, type: 'mcq', question: { en: "Which one of the following virulence factors may be associated with the pathogenesis of infection caused by H.pylori?" }, options: { en: ["A. Flagella", "B. Lipopolysaccharides", "C. Exotoxins", "D. Endotoxins"] }, answer: { en: "A. Flagella" } },
            { number: 6, type: 'mcq', question: { en: "Which one of these is not the common laboratory tests for the identification of Helicobacter pylori?" }, options: { en: ["A. Biopsy test", "B. Urease breath test", "C. Stool antigen test", "D. Urine test"] }, answer: { en: "D. Urine test" } },
            { number: 7, type: 'mcq', question: { en: "Morphology of Helicobacter pylori is a gram negative bacilli in:" }, options: { en: ["A. Curve", "B. Spiral", "C. Bipolar", "D. Coccobacilli"] }, answer: { en: "B. Spiral" } },
            { number: 8, type: 'mcq', question: { en: "Morphology of Vibrio cholorea is a gram negative bacilli in:" }, options: { en: ["A. Curve", "B. Spiral", "C. Bipolar", "D. Coccobacilli"] }, answer: { en: "A. Curve" } },
            { number: 9, type: 'mcq', question: { en: "Morphology of Escherichia coli is a gram negative bacilli with:" }, options: { en: ["A. Curve", "B. Spiral", "C. Bipolar", "D. Coccobacilli"] }, answer: { en: "D. Coccobacilli" } },
            { number: 10, type: 'mcq', question: { en: "Morphology of Haemophilus influenzea is a gram negative:" }, options: { en: ["A. Curve", "B. Spiral", "C. Bipolar", "D. Coccobacilli"] }, answer: { en: "D. Coccobacilli" } },
            { number: 11, type: 'mcq', question: { en: "One of the following is a colony morphology of Proteus sp:" }, options: { en: ["A. Swarming", "B. Mucus", "C. Tiny", "D. Round 2-3mm"] }, answer: { en: "A. Swarming" } },
            { number: 12, type: 'mcq', question: { en: "One of the following is a colony morphology of E.coli:" }, options: { en: ["A. Swarming", "B. Mucus", "C. Tiny", "D. Round 2-3mm"] }, answer: { en: "D. Round 2-3mm" } },
            { number: 13, type: 'mcq', question: { en: "One of the following is a colony morphology of Haemophilus sp:" }, options: { en: ["A. Swarming", "B. Mucus", "C. Tiny", "D. Round 2-3mm"] }, answer: { en: "C. Tiny" } },
            { number: 14, type: 'mcq', question: { en: "One of the following is a colony morphology of Klebsiella sp:" }, options: { en: ["A. Swarming", "B. Mucus", "C. Tiny", "D. Round 2-3mm"] }, answer: { en: "B. Mucus" } },
            { number: 15, type: 'mcq', question: { en: "All of the following bacteria is motile positive except:" }, options: { en: ["A. E.coli", "B. Shigella", "C. Shamonella", "D. Citrobacter"] }, answer: { en: "B. Shigella" } },
            { number: 16, type: 'mcq', question: { en: "Which organism is the most common cause of uncomplicated urinary tract infection (UTIs) in humans?" }, options: { en: ["A. Enterobacter cloacae", "B. Escherichia Coli", "C. Serratia marcescens", "D. Klebsiella pneumoniae"] }, answer: { en: "B. Escherichia Coli" } }
        ];

        let quizDataPart5 = [];
        let quizDataPart6 = [];
        let quizDataPart7 = [];

        // --- Logic Variables ---
        let quizData;
        let currentPart = 1;
        let quizState = {};
        const correctSynth = new Tone.Synth().toDestination();
        const incorrectSynth = new Tone.Synth().toDestination();
        let audioStarted = false;
        let isAnswered = false;

        // --- DOM Cache ---
        const part1Btn = document.getElementById('part1-btn');
        const part2Btn = document.getElementById('part2-btn');
        const part3Btn = document.getElementById('part3-btn');
        const part4Btn = document.getElementById('part4-btn');
        const part5Btn = document.getElementById('part5-btn');
        const part6Btn = document.getElementById('part6-btn');
        const part7Btn = document.getElementById('part7-btn');
        const quizView = document.getElementById('quiz-view');
        const mainScoreTextEl = document.getElementById('main-score-text');
        const questionNavArea = document.getElementById('question-navigation');
        const questionArea = document.getElementById('question-area');
        const questionNumberEl = document.getElementById('question-number');
        const questionTextEl = document.getElementById('question-text');
        const answerArea = document.getElementById('answer-area');
        const feedbackArea = document.getElementById('feedback-area');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const redoBtn = document.getElementById('redo-btn');
        const redoPartBtn = document.getElementById('redo-part-btn');
        const resultsArea = document.getElementById('results-area');
        const resultsScoreEl = document.getElementById('results-score');
        const summaryEl = document.getElementById('summary');
        const restartBtn = document.getElementById('restart-btn');

        async function startAudio() {
            if (!audioStarted) { await Tone.start(); audioStarted = true; }
        }
        
        function switchPart(part) {
            currentPart = part;
            [part1Btn, part2Btn, part3Btn, part4Btn, part5Btn, part6Btn, part7Btn].forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'text-gray-900');
            });
            
            let targetBtn;
            if (part === 1) { quizData = quizDataPart1; targetBtn = part1Btn; }
            else if (part === 2){ quizData = quizDataPart2; targetBtn = part2Btn; }
            else if (part === 3){ quizData = quizDataPart3; targetBtn = part3Btn; }
            else if (part === 4){ quizData = quizDataPart4; targetBtn = part4Btn; }
            else if (part === 5){ quizData = quizDataPart5; targetBtn = part5Btn; }
            else if (part === 6){ quizData = quizDataPart6; targetBtn = part6Btn; }
            else { quizData = quizDataPart7; targetBtn = part7Btn; }
            
            targetBtn.classList.add('bg-indigo-600', 'text-white');
            targetBtn.classList.remove('bg-white', 'text-gray-900');
            document.getElementById('quiz-subtitle').textContent = `Subject: Bacteriology (${quizData.length} questions)`;
            
            if(!quizState[currentPart]) quizState[currentPart] = { userAnswers: [], score: 0, currentQuestionIndex: 0 };
            
            loadQuizView();
        }

        function updateScoreText() {
            mainScoreTextEl.innerHTML = `Score: ${quizState[currentPart].score} / ${quizData.length}`;
        }

        function initializeQuiz() {
            quizState = { 
                1: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 
                2: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 
                3: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 
                4: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 
                5: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 
                6: { userAnswers: [], score: 0, currentQuestionIndex: 0 }, 
                7: { userAnswers: [], score: 0, currentQuestionIndex: 0 } 
            };
            switchPart(currentPart || 1); 
        }
        
        function loadQuizView() {
            quizView.classList.remove('hidden');
            resultsArea.classList.add('hidden');
            [questionNavArea, questionArea, answerArea].forEach(el => el.classList.remove('hidden'));
            renderQuestionButtons();
            showQuestion();
            updateScoreText();
        }

        function renderQuestionButtons() {
            questionNavArea.innerHTML = '';
            quizData.forEach((question, index) => {
                const button = document.createElement('button');
                button.textContent = question.number;
                button.classList.add('question-nav-btn', 'border-2', 'border-gray-300', 'rounded-md');
                button.addEventListener('click', () => { quizState[currentPart].currentQuestionIndex = index; showQuestion(); });
                questionNavArea.appendChild(button);
            });
        }
        
        function updateQuestionButtonStyles() {
            const buttons = Array.from(questionNavArea.children);
            buttons.forEach((button, index) => {
                button.classList.remove('active', 'answered-correct', 'answered-incorrect');
                if (quizState[currentPart].userAnswers[index]) {
                    button.classList.add(quizState[currentPart].userAnswers[index].isCorrect ? 'answered-correct' : 'answered-incorrect');
                }
            });
            const currentQuestionIndex = quizState[currentPart].currentQuestionIndex;
            if(buttons[currentQuestionIndex]) buttons[currentQuestionIndex].classList.add('active');
        }

        function showQuestion() {
            resetState();
            if (quizData.length === 0) {
                questionTextEl.innerHTML = "No questions in this part.";
                questionNumberEl.innerHTML = `Question 0/0`;
                return;
            }
            const idx = quizState[currentPart].currentQuestionIndex;
            const currentQuestion = quizData[idx];
            const userAnswers = quizState[currentPart].userAnswers;
            isAnswered = userAnswers[idx] !== undefined;

            if (isAnswered) redoBtn.classList.remove('hidden');
            questionNumberEl.innerHTML = `Question ${currentQuestion.number}/${quizData.length}`;
            questionTextEl.innerHTML = `${currentQuestion.question.en}`;
            
            if (currentQuestion.type === 'mcq') {
                answerArea.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
                currentQuestion.options.en.forEach((opt) => {
                    const button = document.createElement('button');
                    button.innerHTML = `<span>${opt}</span>`;
                    button.className = 'option-btn w-full p-4 border-2 border-gray-300 rounded-lg text-left hover:bg-gray-100';
                    button.addEventListener('click', () => selectAnswer(button, opt, idx, answerArea, feedbackArea));
                    if(isAnswered) {
                        button.disabled = true;
                        if (opt.trim() === currentQuestion.answer.en.trim()) button.classList.add('correct');
                        if (opt.trim() === userAnswers[idx].answer.trim() && !userAnswers[idx].isCorrect) button.classList.add('incorrect');
                    }
                    answerArea.appendChild(button);
                });
            }
            updateQuestionButtonStyles();
            updateButtonVisibility();
        }
        
        function resetState() { feedbackArea.textContent = ''; answerArea.innerHTML = ''; redoBtn.classList.add('hidden'); }

        function updateButtonVisibility() {
            const idx = quizState[currentPart].currentQuestionIndex;
            prevBtn.classList.toggle('hidden', idx === 0);
            const allDone = quizState[currentPart].userAnswers.filter(Boolean).length === quizData.length;
            nextBtn.classList.toggle('hidden', allDone && idx === quizData.length - 1);
            nextBtn.innerHTML = (idx === quizData.length - 1 || allDone) ? "Show Results" : "Next Question";
        }

        async function selectAnswer(button, opt, idx, container, feedbackEl) {
            await startAudio();
            if (quizState[currentPart].userAnswers[idx]) return;
            const allButtons = container.querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true);
            const q = quizData[idx];
            const isCorrect = opt.trim() === q.answer.en.trim();
            if (isCorrect) {
                quizState[currentPart].score++;
                correctSynth.triggerAttackRelease("C5", "8n");
                button.classList.add('correct');
                feedbackEl.innerHTML = `Correct!`;
                feedbackEl.className = 'mt-2 text-center text-md font-medium text-green-600';
            } else {
                incorrectSynth.triggerAttackRelease("G3", "16n", Tone.now());
                incorrectSynth.triggerAttackRelease("F#3", "8n", Tone.now() + 0.1);
                button.classList.add('incorrect');
                feedbackEl.innerHTML = `Wrong! Correct: ${q.answer.en}`;
                feedbackEl.className = 'mt-2 text-center text-md font-medium text-red-600';
                allButtons.forEach(btn => { if (btn.textContent.trim() === q.answer.en.trim()) btn.classList.add('correct'); });
            }
            quizState[currentPart].userAnswers[idx] = { isCorrect, answer: opt };
            redoBtn.classList.remove('hidden');
            updateScoreText(); updateQuestionButtonStyles(); updateButtonVisibility();
        }

        function showResults() {
            [questionNavArea, questionArea, answerArea, nextBtn, prevBtn, redoBtn].forEach(el => el.classList.add('hidden'));
            resultsArea.classList.remove('hidden');
            resultsScoreEl.innerHTML = `Final score for Part ${currentPart}: ${quizState[currentPart].score} / ${quizData.length}`;
            summaryEl.innerHTML = '<h3 class="text-xl font-bold text-center mb-4">Review:</h3>'; 
            quizState[currentPart].userAnswers.forEach((ua, index) => {
                if (!ua) return;
                const d = quizData[index];
                const div = document.createElement('div');
                div.className = `mb-4 p-3 rounded-md ${ua.isCorrect ? 'bg-blue-100' : 'bg-red-100'}`;
                div.innerHTML = `<p class="font-semibold">${d.number}. ${d.question.en}</p>
                    <p class="text-sm mt-1">Your answer: ${ua.answer}</p>
                    ${!ua.isCorrect ? `<p class="text-sm font-bold text-red-800 mt-1">Correct: ${d.answer.en}</p>` : ''}`;
                summaryEl.appendChild(div);
            });
        }
        
        function redoQuestion() {
            const idx = quizState[currentPart].currentQuestionIndex;
            if (quizState[currentPart].userAnswers[idx]?.isCorrect) quizState[currentPart].score--;
            quizState[currentPart].userAnswers[idx] = undefined;
            updateScoreText(); showQuestion();
        }

        function redoPart() {
            quizState[currentPart] = { userAnswers: [], score: 0, currentQuestionIndex: 0 };
            loadQuizView();
        }

        // Listeners
        [part1Btn, part2Btn, part3Btn, part4Btn, part5Btn, part6Btn, part7Btn].forEach((btn, i) => btn.addEventListener('click', () => switchPart(i+1)));
        prevBtn.addEventListener('click', () => { if (quizState[currentPart].currentQuestionIndex > 0) { quizState[currentPart].currentQuestionIndex--; showQuestion(); } });
        nextBtn.addEventListener('click', () => {
            const idx = quizState[currentPart].currentQuestionIndex;
            if (idx < quizData.length - 1) { quizState[currentPart].currentQuestionIndex++; showQuestion(); }
            else showResults();
        });
        restartBtn.addEventListener('click', initializeQuiz);
        redoBtn.addEventListener('click', redoQuestion);
        redoPartBtn.addEventListener('click', redoPart);
        
        initializeQuiz();
    </script>
</body>
</html>
